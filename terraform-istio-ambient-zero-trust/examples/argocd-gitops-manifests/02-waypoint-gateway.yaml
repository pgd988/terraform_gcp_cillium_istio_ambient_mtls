# Waypoint Gateway deployed inside application namespaces for L7 processing
# GatewayClass `istio-waypoint` automatically provisions an Envoy proxy deployment
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: waypoint
  namespace: backend
  labels:
    # Determines whether the Waypoint intercepts Service VIPs (`service`), Workload IPs (`workload`), or both (`all`)
    istio.io/waypoint-for: service
    app.kubernetes.io/managed-by: argocd
spec:
  gatewayClassName: istio-waypoint
  listeners:
    - name: mesh
      port: 15008
      protocol: HBONE
---
# Example: Custom workload-specific Waypoint Gateway
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: backend-workload-waypoint
  namespace: backend
  labels:
    istio.io/waypoint-for: workload
    app.kubernetes.io/managed-by: argocd
spec:
  gatewayClassName: istio-waypoint
  listeners:
    - name: mesh
      port: 15008
      protocol: HBONE
